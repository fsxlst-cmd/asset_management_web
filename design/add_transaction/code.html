</div>

<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] flex-grow flex flex-col px-container-padding-mobile py-stack-lg gap-stack-lg">

<button class="relative z-10 flex-1 h-full font-label-caps text-label-caps flex items-center justify-center text-primary" onclick="updateSegment(0)">EXPENSE</button>

<button class="relative z-10 flex-1 h-full font-label-caps text-label-caps flex items-center justify-center text-on-surface-variant" onclick="updateSegment(2)">TRANSFER</button>
</div>

<div class="flex items-baseline gap-1">
<span class="font-display-currency-mobile text-display-currency-mobile text-on-surface-variant">Rp</span>
<input class="w-full bg-transparent border-none text-center font-display-currency-mobile text-display-currency-mobile text-on-surface focus:ring-0 placeholder-on-surface-variant/30" id="main-amount" placeholder="0" type="number"/>
</div>
</section>
<!-- Transaction Details Form -->
<div class="flex flex-col gap-stack-md">
<!-- Selector: Budget -->
<div class="flex flex-col gap-stack-sm">

<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-stack-md">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="shopping_bag">shopping_bag</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md-mobile text-on-surface leading-tight">Daily Spending</span>
<span class="text-body-sm text-on-surface-variant">Remaining: Rp 1,200,000</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Selector: Paid From -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">PAID FROM ACCOUNT</label>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">

</div>
</div>

<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">DATE</label>

<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-stack-md">
<p class="text-white text-body-sm font-semibold">Stay on track with your goals.</p>
</div>
</div>
</aside>
<script>
        function updateSegment(index) {
            const bg = document.getElementById('segment-bg');
            const buttons = bg.parentElement.querySelectorAll('button');
            
            // Move background
            const offset = (index * 33.33);
            bg.style.transform = `translateX(${offset}%)`;
            bg.style.left = index === 0 ? '4px' : (index === 1 ? '0px' : '-4px'); // Fine tuning positioning

            // Update text colors
            buttons.forEach((btn, idx) => {
                if(idx === index) {
                    btn.classList.replace('text-on-surface-variant', 'text-primary');
                    btn.classList.add('font-bold');
                } else {
                    btn.classList.replace('text-primary', 'text-on-surface-variant');
                    btn.classList.remove('font-bold');
                }
            });
        }

        // Auto-focus amount field on mobile/entry
        window.addEventListener('load', () => {
            document.getElementById('main-amount').focus();
        });
    </script>
